server.port=8080

# Database Configuration (supports local MySQL, and Render PostgreSQL if env vars are present)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/attendance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_db_password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# JWT Configurations (256-bit secret key)
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f9g8h7i6j5k4l3m2n1o0p9q8r7s6t5u4v3w2x1y0z_DEFAULT_SECURE_KEY}
# Expiration: 24 hours (in milliseconds)
jwt.expiration=86400000

# Mail Configuration (SMTP Placeholders)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Allow files to be uploaded/served properly
spring.web.resources.static-locations=classpath:/static/
